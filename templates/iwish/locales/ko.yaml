guide:
  sidebar_title: 가이드 목차
  main_pipeline: 🚀 메인 파이프라인
  output_structure: 📁 출력 디렉토리 구조
  per: 🔄 범위 확장 검토 (PER)
  orch: 🤖 조정 Agent 라우팅
  supportive_skills: 🛠️ 보조 스킬 시스템
  usecases: 💡 주요 유즈케이스
  title: 🚀 메인 파이프라인
  subtitle: I-Wish의 소프트웨어 개발 라이프사이클은 아이디어 발견부터 릴리스 및 유지보수까지 7단계로 구성된 AI 네이티브 공장으로
    설계되었습니다.
  step_0:
    title: Bootstrap (기존 프로젝트 중도 통합)
    focus: "목표: 진행 중인 기존 프로젝트를 I-Wish의 관리 하에 둡니다 (Brownfield Bootstrapping)."
    badge: 🚀 여기서 시작 - 기존 프로젝트
    desc: "브라운필드 프로젝트(기존 코드베이스)의 경우: 이 명령을 먼저 실행하여 I-Wish가 소스 코드를 자동으로 스캔하고, 종속성을
      맵핑하고, 프로젝트 컨텍스트를 구성하도록 합니다. 처음부터 Discover/Plan 단계를 거칠 필요가 없습니다."
    output: 설정 📄 1. Idea Discovery/1.4. research/project-context.md, 코드베이스 그래프 인덱스
      생성 및 최소 백로그 생성.
    note: "메인 개발 트랙으로 마이그레이션하기 전에 현재 프로젝트 컨텍스트를 자동으로 표준화합니다. 별칭 지원:
      /document-project 또는 /generate-project-context."
  step_1:
    title: Discover & Idea Hardening (아이디어 발견 및 강화)
    focus: "목표: 실현 가능성을 평가하고, 비즈니스 가설을 수립하며, 프로젝트 도메인을 조사합니다."
    desc: 초기 단계는 시장 조사, 기술적 실현 가능성 검토, 제품 가치 제안에 대한 스트레스 테스트에 집중합니다.
  step_1_discover:
    output: 📄 1. Idea Discovery/1.1. idea-discovery.md (Mom Test 및 JTBD).
    note: "전제 단계: 브레인스토밍을 시작하기 전에 아이디어와 사용자 고충을 명확히 합니다."
  step_1_brainstorm:
    output: 📄 1. Idea Discovery/1.2. idea-bank.md (아이디어 초안, 복잡도 점수 CS 1-5).
    note: discover 단계에서 컨텍스트를 명확히 한 후 세부 솔루션과 MVP 범위를 브레인스토밍합니다.
  step_1_challenge:
    output: 📄 1. Idea Discovery/1.3. idea-challenge.md (Amazon PRFAQ 템플릿 포함).
    note: 핵심 가치를 찾기 위해 아마존의 Working Backwards(역방향 작업) 방법론을 사용하여 아이디어에 검증을 시도합니다.
  step_1_evaluator:
    output: 지속 가능한 경쟁 우위 평가 보고서 (Moat Evaluator).
    note: 아이디어를 정제한 후에 실행하여 고유한 비즈니스 경쟁 우위를 찾습니다.
  step_1_research:
    output: 📄 1. Idea Discovery/1.4. research/market-research.md,
      competitor-research.md, domain-research.md, 및 technical-research.md.
    note: 웹 접근을 통해 시장 세부 정보, 규정 준수 또는 기술 라이브러리를 확인합니다.
  step_1_competitor:
    output: 📄 1. Idea Discovery/1.4. research/competitor-research.md.
    note: 경쟁사나 대체 솔루션을 분석하여 현재 솔루션에 대한 불만을 재검증합니다.
  step_1_context:
    output: 📄 1. Idea Discovery/1.4. research/project-context.md.
    note: AI agent가 프로젝트 전반에서 준수하고 참조할 핵심 가이드라인을 생성합니다.
  quick_dev:
    title: Quick Dev Mode (빠른 개발 모드/고속 바이패스)
    focus: "목표: 전체 PRD나 계획 문서 작성 없이 작은 기능을 빠르게 구현합니다."
    badge: ⚡ 지금 개발 - 고속 바이패스
    desc: "전체 프로세스 오버헤드를 우회: 계획에 필요한 정형화된 문서 작성 없이 기술 사양/지침에서 긴급 핫픽스나 작은 기능을 직접 수행해야
      하는 엔지니어를 위해 설계되었습니다. 속도가 최우선 과제인 경우 사용합니다."
    output: 문서 생성을 비대화하지 않고 소스 코드를 직접 수정합니다.
    note: 코딩 속도를 극대화하기 위해 시스템이 엄격한 계획 검토 게이트를 자동으로 우회합니다.
  step_2:
    title: Plan (제품 요구사항 계획)
    focus: "목표: 제품의 가치를 명확한 기능 사양 문서로 구체화합니다."
    desc: 계획 단계를 상세화하고 명확한 성공 지표를 포함한 전체 제품 요구사항 문서(PRD)를 작성합니다.
  step_2_prd:
    output: 📄 2. Product Planning/2.1. product-brief-or-prd.md (SMART PRD).
    note: 성공 지표, 기술 스택, 기능 요구사항(FR) 및 비기능 요구사항(NFR)이 포함됩니다.
  step_2_brand:
    output: 📄 압축 아카이브 _iwish-output/brand-identity/ (brand-guideline.html,
      brand-guidelines.md, strategy/, assets/logo/, design-tokens.json 포함) 생성 및
      대체 파일을 /assets에 복사.
    note: "옵션 단계: 프로젝트에 브랜드 아이덴티티가 없는 경우 UI/UX 전에 실행합니다. 스타일의 세부 사항이 디자인 시스템에 영향을
      미치기 때문입니다. Kapferer의 브랜드 프리즘을 사용하여 로고를 생성하고 3가지 재구성 경로(A: 정리, B: 진화, C:
      혁신)로 관리합니다."
  step_2_ux:
    output: 📄 2. Product Planning/2.3. ui-ux-spec.md (사용자 경험 맵과 전체 UX 사양).
    note: PRD가 완료된 후에 실행되어 레이아웃 구조와 상호작용을 구상합니다.
  step_2_prototype:
    output: 📄 2. Product Planning/prototypes/prototype-referrence-only.html (HTML 대화형 프로토타입).
    note: "필수 계획 승인 게이트. feature-hierarchy.md에서 내비게이션 구조를, ui-ux-spec.md에서 스타일/디자인 토큰을 통합하여 이식 가능한 단일 파일 HTML 미리보기로 합성합니다."
  step_2_sim:
    output: 📄 2. Product Planning/2.3.5. system-integrity-map.md (시스템 무결성 맵 - SIM).
    note: "시스템 레이어와 경계를 분석하여 고립된 구성 요소, FE 전용 프래그먼트, 중복되는 재사용 엔진 및 커버리지 갭을 방지합니다. 최소 5가지 아키텍처 옵션을 제안합니다."
  step_3:
    title: Solution (아키텍처와 백로그)
    focus: "목표: 기술 설계 청사진을 수립하고, Epics & Stories를 분해하며, 스프린트를 초기화합니다."
    desc: 기술 아키텍처를 설계하고 사용자 스토리 백로그를 정리하며 활성 스프린트 주기를 계획합니다.
  step_3_arch:
    output: 📄 docs/architecture.md (ADR) 및 2. Product Planning/2.2. database-spec.md.
    note: 데이터베이스, ERD 다이어그램, API 계약 및 디렉토리 구조 설계를 정의합니다.
  step_3_stories:
    output: 📄 2. Product Planning/2.4. epics-and-stories.md 및 스켈레톤 사용자 스토리 파일.
    note: PRD 요구사항을 사용자 가치에 초점을 맞춘 독립적인 Epics와 Stories로 분해합니다.
  step_4:
    title: Implement (마이크로루프 구현)
    focus: "목표: 개별 스토리의 세부 사항을 구체화(마이크로루프)하고 코딩 로직을 실행합니다."
    desc: "각 Story 개발 루프: 스토리 상세 생성 -> UI/UX 사양 -> 데이터 사양 -> 코딩 로직 구현."
  step_4_story:
    output: 📄 3. Development/1. Epic & Story/Epic-[ID]/Story-[ID]/story.md 개발 준비 완료.
    note: 인수 조건(Acceptance Criteria), 구현 시 주의사항 및 대상 범위를 지정합니다.
  step_4_ui:
    output: 📄 3. Development/1. Epic & Story/Epic-[ID]/Story-[ID]/ui-ux-spec.md (상세
      UI 사양).
    note: 설정된 디자인 도구(Stitch, Figma, Claude)를 통해 레이아웃을 동기화하고 디자인 모델을 동기화합니다.
  step_4_data:
    output: 📄 3. Development/1. Epic & Story/Epic-[ID]/Story-[ID]/database-spec.md.
    note: 코딩을 시작하기 전에 데이터베이스 업데이트가 필요한 경우 자동으로 생성됩니다.
  step_4_code:
    output: 💻 클린 아키텍처(Clean Architecture) 규격을 준수한 소스 코드 및 유닛 테스트(커버리지 > 80%).
    note: 코드 실행을 시작하는 canonical 명령. 데이터베이스 사양에 대한 일관성을 자동 검증합니다.
  step_4_per:
    output: 📄 3. Development/project-expansion-review/PER-[feature-name].md.
    note: "진행 중인 프로젝트 범위의 확장을 제안할 때 영향과 방향 전환 위험을 평가합니다. 별칭: /per,
      /feature-expansion-review."
  step_5:
    title: Validate (품질 게이트)
    focus: "목표: 코드 품질 검토, 아키텍처 감사 및 회귀 테스트 실행."
    desc: 자동화된 검토를 수행하고 하위 호환성 위험을 분석하며 전반적인 코드베이스 상태를 감사합니디.
  step_5_review:
    output: 📄 상세 검토 보고서, 보안 스캔(SAST) 및 Hybrid QA 스코어카드.
    note: 릴리스 빌드를 컴파일하기 전에 코드 품질, 테스트 커버리지 및 보안을 검증합니다.
  step_5_health:
    output: 📄 코드베이스 상태 보고서(데드 코드, 순환 종속성, 분리된 파일).
    note: 아키텍처 변형을 방지하고 기술 부채를 정리하기 위해 주기적으로 실행합니다.
  step_6:
    title: Deliver & Release (인도 및 릴리스)
    focus: "목표: 제품 인도, CI/CD 구성 및 안전한 릴리스 실행."
    desc: 기능이 검증되면 릴리스 파이프라인을 구성하고 트래픽을 할당하여 출시합니다.
  step_6_canary:
    output: 카나리아 릴리스 계획, 스테이징/운영에서의 트래픽 제어 구성.
    note: 배포 위험을 최소화하기 위해 단계적인 릴리스를 수행합니다.
  step_7:
    title: Operate, Maintain & Evolve (운영, 유지보수 및 진화)
    focus: "목표: 지식 증분을 수집하고 운영 환경 문제를 해결하며 운영을 최적화합니다."
    desc: 출시 후 유지보수, 긴급 핫픽스 수행, 진화된 스킬의 피드백을 제공합니다.
  step_7_retro:
    output: 📄 4. Verification & Release/4.3. retrospective.md.
    note: 각 스프린트 후에 지식 증분(Knowledge Delta)을 수집하여 Corporate Brain(기업 두뇌)에 피드백합니다.
  step_7_fix:
    output: 📄 3. Development/2. Bug Report/ 하위의 버그 보고서, 소스 코드가 핫픽스 수정되었습니다.
    note: 문제가 발생했을 때 즉시 트리거되어 구조화된 진단 정보를 생성합니다.
  step_7_dashboard:
    output: 🖥️ 컴파일된 I-Wish 워크스페이스 사용자 가이드 & 대시보드(HTML 형식).
    note: "스프린트 추적 데이터와 그래프를 컴파일합니다. CLI에서 실행 가능: iwish gen-dashboard."
  dir_title: 📁 표준 출력 디렉토리 구조
  dir_desc: I-Wish는 단계 간 추적 가능성을 보장하기 위해 표준 디렉토리 레이아웃 아래에서 모든 계획, 설계, 사양 및 검증 문서를 관리합니다.
  per_title: 🔄 프로젝트 범위 확장 검토 (PER) 프로토콜
  per_desc: 진행 중인 프로젝트에서 새로운 기능/모듈이 요청될 경우, I-Wish는 PER 워크플로우를 트리거하여 범위 영향을 3개
    계층으로 분류합니다.
  per_tier_1:
    title: "🟢 계층 1: 낮은 영향"
    desc: "핵심 흐름이나 데이터베이스 스키마를 변경하지 않는 경미한 기능 추가. 경로: 스토리 생성(/make-story)을 지속하고 개발
      수행. 출력: story.md, sprint-status.yaml, task.md."
  per_tier_2:
    title: "🟡 계층 2: 중간 정도의 영향"
    desc: "핵심 데이터베이스에 영향을 주거나 핵심 사용자 흐름을 변경하는 대규모 기능 모듈. 경로: 스토리 생성을 동결. /plan으로 돌아가
      PRD를 업데이트하고 데이터베이스 사양을 재설계하며 Epics를 다시 분해합니다. 출력: PRD.md,
      epics-and-stories.md, database-spec.md."
  per_tier_3:
    title: "🔴 계층 3: 높은 영향 (방향 전환)"
    desc: "제품 핵심 가치, 사용자 이미지 또는 기본 기술 스택을 변경합니다. 경로: 모든 개발 동결. /idea-challenge로 돌아가
      핵심 가설을 테스트하고 새로운 /research를 실행한 후 PRD를 다시 구축합니다. 출력: idea-challenge.md,
      research/, architecture.md."
  orch_title: 🤖 스마트 제어 라우팅
  orch_desc: 이 모든 프로세스가 복잡하게 느껴지시나요? 걱정 마세요! 워크플로우는 구조를 정의하지만, 모든 명령을 수동으로 호출할 필요는
    없습니다. I-Wish의 최고 두뇌인 Orch Agent에게 이야기하세요. 컨텍스트를 분석하여 태스크를 자동으로 위임합니다!
  orch_badge: 💡 지금 자동화 - 컨트롤러 실행
  orch_note: 통합된 컨트롤러 인터페이스. 의도를 자동으로 감지하고 요청을 라우팅하여 개발자의 수동 입력을 최소화합니다.
  skills_title: 🛠️ 보조 및 기반 스킬 시스템
  skills_desc: 메인 개발 트랙 외에도 I-Wish는 코드 품질 감사, 보안 검증 및 UX 최적화를 수행하는 전문 스킬을 통합하고 있습니다.
  skills:
    desc_repo_absorption: GitHub의 외부 저장소를 분석, 흡수 및 해체하고 지침을 자동으로 통합하며 Orch 라우팅과 연결합니다.
    desc_idea_hardening: 제품 아이디어를 엄격하게 평가하고 절충안 및 핵심 가치와 함께 최소 2-3가지 구현 접근 방식을 분석합니다.
    desc_security_guardian: "외부 보안 제어: 머지/배포 전에 취약점, 비밀 누출을 스캔하고 신뢰 수준을 검토하며 최소 권한을 강제합니다."
    desc_ux_guardian: 사용자 인터페이스가 마스터 디자인 시스템과 완벽하게 일치하도록 하여 여러 스프린트에 걸친 스타일 변형을 방지합니다.
    desc_user_simulation_guardian: 1st-Principle 사고를 사용하여 다양한 비즈니스 페르소나의 행동을 시뮬레이션하여
      UX 흐름의 일관성을 테스트합니다 (/simulate-user를 통해 실행).
    desc_pivot_guardian: "루프 게이트키퍼: 테스트나 빌드를 실행하지 않고 에이전트가 동일한 파일을 3회 이상 연속 수정하는 경우 자동으로 중단합니다."
    desc_socratic_review: 소크라테스식 질의응답을 수행하여 데이터베이스 변경 사항을 검토하고 하위 호환성 제어하며 아키텍처 변형을 방지합니다.
    desc_qa_simulator_guardian: 포괄적인 테스트 프로세스를 시뮬레이션하고 Hybrid 스코어카드를 계산하여 코드 릴리스 준비 상태를 평가합니다.
    desc_creative_agent: "크리에이티브 지원 에이전트: 2-3가지 UI/UX 디자인 방향을 제안하고 HTML/Mermaid 목업
      작성을 지원하며 Stitch 디자인을 통합합니다."
    desc_ai_engineer_agent: "AI/LLM 개발 에이전트: 프롬프트 템플릿 최적화, 토큰 버짓 관리, 프롬프트 인젝션 방지 및 모델 계층을 할당합니다."
    desc_data_architect_agent: "데이터 관리 에이전트: 데이터베이스 스키마 설계, 마이그레이션 동기화(Prisma) 및 데이터
      사양(Data Specs)의 일관성을 검증합니다."
    desc_data_strategist_agent: "데이터 전략 에이전트: 통합 데이터 분석 계획, 하위 호환성 제어 및 프로젝트 정보 구조를 모델링합니다."
  usecases_title: 💡 유즈케이스 실행 가이드
  usecases_desc: "I-Wish에서 흔히 발생하는 운영 시나리오와 이를 해결하기 위한 주요 워크플로우:"
  usecase_1:
    title: GitHub 리포지토리 흡수 (RAP 프로토콜)
    desc: 외부 리포지토리나 스킬 템플릿을 GitHub에서 I-Wish로 복제, 분석, 흡수하고 싶을 때.
    action: "RAP 파이프라인: security-guardian이 신뢰성/악성코드를 스캔하고, repo-absorption이 코드 관계도를
      복제 및 인덱싱하고, 통합 가이드를 생성하며, Orch 라우팅용 트리거 태그를 바인딩합니다."
  usecase_2:
    title: 기존 웹사이트 복제 (Cloner)
    desc: 공개 웹사이트의 비주얼 레이아웃을 복제하여 정돈된 React/HTML UI 컴포넌트를 출력해야 할 때.
    action: "브라우저 구동 복제: DOM/CSS 구조를 캡처하고, 글꼴, 레이아웃 토큰을 추출하며, 코드를 컴파일합니다."
  usecase_3:
    title: UI 디자인 동기화 (Stitch / UX Pro Max)
    desc: 목업을 디자인하고 디자인 사양을 Stitch 디자인 서버와 동기화하고 싶을 때.
    action: "UX 동기화 워크플로우: /create-ux-design 및 /make-ui-spec을 실행합니다.
      /sync-stitch-design을 호출하여 변경 사항을 푸시합니다. Visual-fidelity-gate는 프론트엔드 코드가
      목업과 일치하는지 자동으로 검증합니다."
  usecase_4:
    title: 코드베이스 분석 및 지식 그래프화
    desc: Orch 라우팅을 위해 파일 가져오기 관계를 맵핑하고, 스토리 구현 영향(Feature 그래프)을 추적합니다.
    action: "분석기: 소스 코드를 스캔하고, 기능 종속성 노드를 추적하며, 대시보드의 그래프를 업데이트합니다."
  usecase_5:
    title: 카나리아 배포 및 스테이징 검증
    desc: 전체 운영 릴리스 전에 스테이징 트래픽의 일부에서 새 코드를 테스트합니다.
    action: "배포 워크플로우: /canary를 실행하여 샌드박스를 실행하고 성능을 모니터링하며 자동 롤백을 구성합니다."
  usecase_6:
    title: 긴급 핫픽스 및 운영 진단
    desc: 운영 버그를 진단하고 호환성을 손상시키지 않고 안전하게 핫픽스를 배포합니다.
    action: "진단 루프: /fix-bug를 실행하여 근본 원인을 분석하고 회귀 테스트를 생성하며 패치 버전을 적용합니다."
  usecase_7:
    title: 브랜드 아이덴티티, 로고 및 스타일 가이드라인
    desc: 브랜드 자산, 로고 및 가이드라인을 처음부터 생성하거나 기존 자산을 리팩토링합니다.
    action: "브랜드 프리즘 워크플로우: /brand를 실행하여 브랜드 프리즘 설문을 실시하고, 컨셉 로고를 설계하고, 디자인 토큰을 내보냅니다."
  label_note: "참고:"
  label_output: "출력:"
plugins:
  sidebar_title: Tournament 경기장
  nav_intro: ℹ️ 기본 소개
  nav_registry: 🔌 Plugins 레지스트리
  nav_workflow: ⚔️ 5단계 절차
  nav_usecases: 💡 실제 활용 사례
  nav_slash: 💬 명령줄 예시
  title: 🔌 Plugin 기반 A/B 토너먼트
  intro: I-Wish는 유연한 플러그인 아키텍처와 함께 고급 A/B 토너먼트 시스템을 활용합니다. 흡수한 모든 저장소나 스킬셋을 코어
    코드베이스에 직접 병합하는 대신, 사용자는 이를 독립된 플러그인으로 패키징할 수 있습니다. 태스크를 실행해야 할 때 병렬 토너먼트를
    트리거할 수 있으며, 여러 후보 플러그인이 격리된 워크스페이스에서 작업을 독립적으로 수행합니다. 그 후 시스템은 결과를 평가하고 사용자가
    가장 적합한 결과를 선택할 수 있도록 지원합니다.
  card_isolation:
    title: 🛡️ 안전한 격리
    desc: 각 후보는 격리된 워크스페이스 안의 서로 다른 Git 브랜치에서 태스크를 수행합니다. 워크스페이스 충돌이나 지저분한 상태가 발생할
      걱정이 없습니다.
  card_evaluation:
    title: 📊 공정한 평가
    desc: review-agent는 요구사항, 코드 품질, 안정성 및 자동 테스트 성능을 바탕으로 각 후보를 평가합니다.
  card_hitl:
    title: 👑 사용자 개입
    desc: 직관적인 시각적 레이아웃으로 경쟁 스코어카드와 차이점(diff)을 비교 검토하고, 병합할 브랜치를 직접 승인합니다.
  registry_title: 🔌 Plugins & Modules Registry (플러그인 및 모듈 레지스트리)
  registry_desc: 다음은 토너먼트 관리 및 구성에 사용되는, 기능 영역별로 분류된 활성 플러그인 레지스트리입니다.
  registry_uiux: 🎨 UI/UX & Design Providers (디자인 및 인터페이스)
  registry_coding: ⚡ Coding & Productivity (개발 생산성 및 최적화)
  registry_badge_illustrative: 예시 데이터
  desc_uiux_pro_max: 반응성이 뛰어난 인터페이스, 커스텀 전환 효과 및 정제된 시각적 토큰을 제공하는 플러그인.
  desc_taste_skill: 감각적인 마이크로 디테일, HSL 팔레트, 세련된 타이포그래피에 특화된 레이아웃 프로바이더.
  desc_stitch: Stitch 디자인 서버와 통합된 기본 시각 사양 시스템.
  desc_superpower: 고급 코드 생성 및 리팩토링을 제공하는 수학 연산 중심의 알고리즘 최적화 모듈.
  desc_vibecode: 개발 속도를 최우선으로 고려한 간소화된 프롬프트 지시형 개발 프레임워크.
  desc_native: 핵심 I-Wish 개발 구현 워크플로우 (표준 dev-agent 실행).
  workflow_title: ⚔️ 5단계 토너먼트 파이프라인
  workflow_desc: A/B 토너먼트 파이프라인은 코드의 품질과 안정성을 보장하기 위해 5가지 고유한 단계를 거쳐 실행됩니다.
  step_setup:
    title: Arena Setup (경기장 준비)
    focus: "목표: 후보 플러그인 간의 완전한 격리를 보장합니다."
    desc: git의 상태를 검증합니다. 선택된 각 후보 플러그인에 대해 I-Wish는 기본 커밋을 기준으로 자동으로 새로운 Git 브랜치를
      분기시킵니다.
  step_dispatch:
    title: Agent Dispatch (에이전트 배포)
    focus: "목표: 병렬 워크스페이스에서 작업을 실행합니다."
    desc: "Workspace: branch 설정을 가진 병렬 하위 에이전트를 가동합니다. 각 에이전트는 격리된 브랜치 컨텍스트 내에서 지시
      사항을 실행합니다."
  step_gate:
    title: Resolution Gate (결정 단계)
    focus: "목표: 객관적인 평가와 점수 측정."
    desc: 코드를 컴파일하고 자동 테스트(npm test)를 실행합니다. review-agent가 요구사항 준수, 코드 품질, 안전성, 테스트
      통과율을 기준으로 후보들을 채점합니다.
  step_human:
    title: Human Checkpoint (검토 및 의사결정)
    focus: "목표: 사용자가 최선의 솔루션을 최종 승인합니다."
    desc: 후보들의 diff와 로그를 비교하는 스코어카드를 출력합니다. 사용자는 병합할 브랜치를 선택하거나 토너먼트를 전면 취소할 수 있습니다.
  step_merge:
    title: Merge & Cleanup (병합 및 정리)
    focus: "목표: 깔끔한 병합을 완료하고 임시 브랜치를 제거합니다."
    desc: 승인된 우승 브랜치를 메인 브랜치에 병합합니다. 모든 임시 토너먼트 브랜치와 에이전트의 워크스페이스는 자동으로 정리됩니다.
  usecases_title: 💡 실용적인 활용 사례
  usecases_desc: A/B 토너먼트를 활용하여 복잡한 아키텍처적 선택을 해결하는 현실적인 시나리오 예시입니다.
  usecase_design:
    title: "🎨 시나리오 1: 여러 UI 디자인 스타일 비교"
    desc: 로그인 페이지 등 유저 인터페이스를 개발하고 있으며, 최종 병합 전 여러 디자인 레이아웃 버전을 시각적으로 비교하고 싶을 때.
    action: ui-ux-pro-max(애니메이션), taste-skill(고급 폰트), native(기본형) 후보를 등록하여 토너먼트를 엽니다.
    cmd_label: "실행 명령어:"
    cmd_text: /tournament ui-ux-pro-max, taste-skill, native 모듈을 활용해 고급스러운 로그인 페이지 디자인 요청
    result: "👉 결과: 3개의 브랜치가 병렬로 수행됩니다. 스코어카드에 디자인 스타일과 코드 품질 요약이 제공되어 사용자의 최종 선택을
      돕습니다."
  usecase_optim:
    title: "⚡ 시나리오 2: 알고리즘 최적화 및 벤치마크 평가"
    desc: 성능이 극도로 중요한 대용량 데이터 처리 프로세서를 작성 중이며 자원 효율성을 비교 평가하고 싶을 때.
    action: Superpower(강력한 알고리즘 연산), vibecode-pro-max(초경량 코딩), native를 경쟁시킵니다.
    cmd_label: "실행 명령어:"
    cmd_text: /tournament Superpower, vibecode-pro-max, native 모듈로 10000개 노드 경로탐색
      알고리즘 최적화
    result: "👉 결과: 경쟁 후보들이 성능 메트릭(메모리 사용량, 실행 속도)을 스코어카드에 출력하여 객관적인 비교를 지원합니다."
  syntax_title: 💬 자연어 기반 토너먼트 실행 구문
  syntax_desc: 장황한 CLI 플래그 대신 자연어 대화 형태로 토너먼트를 호출할 수 있습니다. 요청에는 다음 3가지 핵심 요소가 포함되어야 합니다.
  syntax_part1: "1. 작업 행위 및 설명 (Task Action & Description): 구현하고 싶은 내용을 명확히 설명합니다
    (예: '고급스러운 로그인 페이지 디자인 요청')."
  syntax_part2: "2. 구조 연결 키워드 (Connecting Keyword): 문장 연결용 접속사 (예: '모듈을 활용해',
    '사용하여', '이용해', 'with modules', 'using')."
  syntax_part3: "3. 후보 목록 (Candidates List): 쉼표와 '및' / 'and'로 구분된 모듈 목록 (예:
    'ui-ux-pro-max, taste-skill 및 native')."
  syntax_example_label: "실제 실행 예시:"
  warning_title: "⚠️ 예외 상황: 후보 모듈을 지정하지 않고 실행한다면?"
  warning_desc: "만약 후보 목록 없이 `/tournament [작업 내용]`만 입력할 경우(예: `/tournament 로그인 페이지
