guide:
  sidebar_title: Guide Navigation
  main_pipeline: 🚀 Main Pipeline
  output_structure: 📁 Output Structure
  per: 🔄 Expansion Review (PER)
  orch: 🤖 Orch Agent Routing
  supportive_skills: 🛠️ Supportive Skills
  usecases: 💡 Key Use Cases
  title: 🚀 Main Pipeline
  subtitle: The software development lifecycle in I-Wish is designed as an
    AI-Native Factory with 7 phases from idea discovery to release &
    maintenance.
  step_0:
    title: Bootstrap (Mid-project Integration)
    focus: "Goal: Put I-Wish in charge of an in-flight project (Brownfield
      Bootstrapping)."
    badge: 🚀 START HERE - EXISTING PROJECT
    desc: "For brownfield projects (existing codebase): Run this command first to
      let I-Wish automatically scan source code, map dependencies, and set up
      project context without going through the Discover/Plan flow from
      scratch."
    output: Setup 📄 1. Idea Discovery/1.4. research/project-context.md, index
      codebase graph, and generate minimum backlog.
    note: "Automatically normalizes current project context before transferring to
      the main development track. Supports aliases: /document-project or
      /generate-project-context."
  step_1:
    title: Discover & Idea Hardening
    focus: "Goal: Assess feasibility, formulate business hypotheses, and research
      project domain."
    desc: The initial phase focuses on market research, technical feasibility
      studies, and stress-testing the product value proposition.
  step_1_discover:
    output: 📄 1. Idea Discovery/1.1. idea-discovery.md (Mom Test & JTBD).
    note: "Prerequisite step: Clarify idea and user pain points before
      brainstorming."
  step_1_brainstorm:
    output: 📄 1. Idea Discovery/1.2. idea-bank.md (Draft ideas, Complexity Score CS
      1-5).
    note: Brainstorm detailed solution and MVP scope after clarifying context in the
      discover step.
  step_1_challenge:
    output: 📄 1. Idea Discovery/1.3. idea-challenge.md (contains Amazon PRFAQ
      template).
    note: Challenge ideas using Amazon's Working Backwards methodology to find core
      value.
  step_1_evaluator:
    output: " sustainable competitive moat evaluation report."
    note: Trigger after refining ideas to find proprietary business advantages.
  step_1_research:
    output: 📄 1. Idea Discovery/1.4. research/market-research.md,
      competitor-research.md, domain-research.md, and technical-research.md.
    note: Perform checks on market details, compliance, or technical libraries via
      web access.
  step_1_competitor:
    output: 📄 1. Idea Discovery/1.4. research/competitor-research.md.
    note: Analyze competitors or alternatives to re-verify dissatisfaction with
      current solutions.
  step_1_context:
    output: 📄 1. Idea Discovery/1.4. research/project-context.md.
    note: Generate core guidelines for AI agents to follow and respect across the
      project.
  quick_dev:
    title: Quick Dev Mode (Fast Track Bypass)
    focus: "Goal: Quickly implement small features without writing full PRD/Planning
      documents."
    badge: ⚡ DEVELOP NOW - FAST BYPASS
    desc: "Bypass full pipeline overhead: Designed for engineers needing to run
      urgent hotfixes or small features directly from tech-spec/instructions,
      without planning boilerplate. Use when speed is the absolute priority."
    output: Direct source code modifications without bloating document generation.
    note: System automatically bypasses strict planning review gates to maximize
      coding speed.
  step_2:
    title: Plan (Product Requirements)
    focus: "Goal: Detail the product value into clear functional specification
      documents."
    desc: Phase for detailing plans, building complete product requirement documents
      (PRD) with clear success metrics.
  step_2_prd:
    output: 📄 2. Product Planning/2.1. product-brief-or-prd.md (SMART PRD).
    note: Contains Success Metrics, Technical Stack, Functional (FR) and
      Non-Functional Requirements (NFR).
  step_2_brand:
    output: 📄 Package _iwish-output/brand-identity/ (brand-guideline.html,
      brand-guidelines.md, strategy/, assets/logo/, design-tokens.json) & copy
      fallbacks to /assets.
    note: "Optional step: Run before UI/UX if the project has no brand identity, as
      styling details affect design system. Generates logos using Kapferer's
      Brand Prism, managed via 3 Refactoring paths (A: Cleanup, B: Evolution, C:
      Revolution)."
  step_2_ux:
    output: 📄 2. Product Planning/2.3. ui-ux-spec.md (User journey maps and overall
      UX spec).
    note: Trigger after PRD is completed to outline layout structure and
      interactions.
  step_2_prototype:
    output: 📄 2. Product Planning/prototypes/prototype-referrence-only.html (Prototype Reference-Only HTML).
    note: "Mandatory planning approval gate. Synthesizes navigation structures from
      feature-hierarchy.md and styles/design tokens from ui-ux-spec.md into a
      portable, single-file HTML preview."
  step_3:
    title: Solution (Architecture & Backlog)
    focus: "Goal: Establish technical design blueprints, break down Epics & Stories,
      and initialize sprint."
    desc: Design the technical architecture, compile user story backlogs, and plan
      active sprint cycles.
  step_3_arch:
    output: 📄 docs/architecture.md (ADR) & 2. Product Planning/2.2. database-spec.md.
    note: Defines databases, ERD diagrams, API contracts, and directory structure
      design.
  step_3_stories:
    output: 📄 2. Product Planning/2.4. epics-and-stories.md & skeleton User Story
      files.
    note: Decompose PRD requirements into independent, user-value-focused Epics and
      Stories.
  step_4:
    title: Implement (Micro-loop Implementation)
    focus: "Goal: Specify details for individual stories (Micro-loop) and execute
      coding logic."
    desc: "Development loop for each Story: Create story detail -> UI/UX Spec ->
      Data Spec -> Write source code."
  step_4_flow:
    output: "💡 Fast Command: /flow (Automated Epic/Story SDLC Pipeline)"
    note: "Automates the entire flow: /make-story -> /make-ui-spec & /make-data-spec -> design scoring to decide screen mockup generation on configured platform (Stitch, Figma, Claude Design, Canva, etc.) -> wait for approval user gate -> /code -> /review. Advanced Tip: You can trigger /flow concurrently on non-dependent stories in an Epic for parallel sub-agent execution."
  step_4_story:
    output: 📄 3. Development/1. Epic & Story/Epic-[ID]/Story-[ID]/story.md ready
      for development.
    note: Specify Acceptance Criteria, implementation notes, and target scope.
  step_4_ui:
    output: 📄 3. Development/1. Epic & Story/Epic-[ID]/Story-[ID]/ui-ux-spec.md
      (detailed UI spec).
    note: Synchronize layout and sync design mockups via configured design tools
      (Stitch, Figma, Claude).
  step_4_data:
    output: 📄 3. Development/1. Epic & Story/Epic-[ID]/Story-[ID]/database-spec.md.
    note: Automatically created if the story requires database updates prior to
      coding.
  step_4_code:
    output: 💻 Clean Architecture compliant source code and unit tests (coverage >
      80%).
    note: Canonical command to start code execution. Auto-checks consistency against
      database specs.
  step_4_per:
    output: 📄 3. Development/project-expansion-review/PER-[feature-name].md.
    note: "Evaluate impacts and pivot risks when proposing to expand project scope
      in-flight. Aliases: /per, /feature-expansion-review."
  step_5:
    title: Validate (Quality Gates)
    focus: "Goal: Review code quality, audit architecture, and perform regression
      testing."
    desc: Perform automated reviews, analyze backward compatibility risks, and audit
      the global codebase health.
  step_5_review:
    output: 📄 Detailed review report, security scans (SAST), and Hybrid QA Scorecard.
    note: Ensure code quality, test coverage, and security before compiling release
      builds.
  step_5_health:
    output: 📄 Codebase health report (dead code, circular dependencies, orphan files).
    note: Run periodically to prevent architectural drift and clean up technical
      debt.
  step_6:
    title: Deliver & Release
    focus: "Goal: Product handoff, CI/CD configuration, and executing safe rollouts."
    desc: Once features are verified, configure release pipelines, direct traffic
      allocation, and launch.
  step_6_canary:
    output: Canary rollout plan, traffic gating configurations on staging/production.
    note: Implement incremental rollout to minimize deployment risks.
  step_7:
    title: Operate, Maintain & Evolve
    focus: "Goal: Harvest knowledge delta, handle production issues, and optimize
      operations."
    desc: Post-release maintenance, running urgent hotfixes, and feeding back
      evolved capabilities.
  step_7_retro:
    output: 📄 4. Verification & Release/4.3. retrospective.md.
    note: Harvest Knowledge Delta to feed back into the Corporate Brain after each
      sprint.
  step_7_fix:
    output: 📄 Bug reports under 3. Development/2. Bug Report/, source code hotfixed.
    note: Trigger immediately when issues occur, generating structured diagnostics.
  step_7_dashboard:
    output: 🖥️ Compiled I-Wish Workspace User Guide & Dashboard (HTML format).
    note: "Compile sprint tracking data and graphs. Can be run via CLI: iwish
      gen-dashboard."
  dir_title: 📁 Standardized Output Directory Structure
  dir_desc: "I-Wish manages all planning, design, specs, and verification
    documents under a standard directory layout to ensure traceability across
    phases:"
  per_title: 🔄 Project Expansion Review (PER) Protocol
  per_desc: "When a new feature/module is requested on an in-flight project,
    I-Wish triggers the PER workflow to classify scope impacts into 3 tiers:"
  per_tier_1:
    title: "🟢 Tier 1: Low Impact"
    desc: "Minor feature additions without changing core flows or database schemas.
      Route: Continue generating Story (/make-story) and develop. Outputs:
      story.md, sprint-status.yaml, task.md."
  per_tier_2:
    title: "🟡 Tier 2: Medium Impact"
    desc: "Large feature module impacting core databases or changing core user
      flows. Route: Freeze story creation. Pivot back to /plan to update PRD,
      re-architect database spec, and re-decompose Epics. Outputs: PRD.md,
      epics-and-stories.md, database-spec.md."
  per_tier_3:
    title: "🔴 Tier 3: High Impact (Pivot)"
    desc: "Changes core product values, user personas, or baseline tech stack.
      Route: Freeze all development. Pivot back to /idea-challenge to
      stress-test core assumptions, run new /research, and rebuild PRD. Outputs:
      idea-challenge.md, research/, architecture.md."
  orch_title: 🤖 Smart Orchestration Routing
  orch_desc: Feel overwhelmed by all these workflows? No worries! While the
    pipeline defines the structure, you do not need to call every command
    manually. Just talk to the Orch Agent - the supreme brain of I-Wish. It
    analyzes context and delegates tasks automatically!
  orch_badge: 💡 AUTOMATE NOW - RUN ORCHESTRATOR
  orch_note: Unified orchestrator interface. Detects intent and routes requests
    automatically, minimizing manual developer input.
  skills_title: 🛠️ Supportive & Foundational Skills System
  skills_desc: Beyond the main track, I-Wish integrates specialized skills tasked
    with auditing code quality, validating security, and optimizing UX.
  skills:
    desc_repo_absorption: Analyze, absorb and deconstruct external repositories from
      GitHub, automatically integrating instructions and linking with Orch
      routing.
    desc_idea_hardening: Rigorously evaluate product ideas, analyze at least 2-3
      implementation approaches along with trade-offs and core value.
    desc_security_guardian: "External security control: scan vulnerabilities, secret
      leaks, review trust levels and enforce least privileges before
      merging/deploying."
    desc_ux_guardian: Ensure user interfaces match the Master Design System
      perfectly, preventing style drift across multiple sprints.
    desc_user_simulation_guardian: Simulate behaviors of different business personas
      using 1st-Principle thinking to test UX flow coherence (run via
      /simulate-user).
    desc_pivot_guardian: "Loop gatekeeper: automatically interrupt the agent if it
      edits a file consecutively more than 3 times without running tests or
      builds."
    desc_socratic_review: Perform Socratic Q&A to review database changes, control
      backward compatibility, and prevent architectural drift.
    desc_qa_simulator_guardian: Simulate full testing processes and calculate the
      Hybrid Scorecard to evaluate readiness for code shipping.
    desc_creative_agent: "Creative support agent: propose 2-3 UI/UX design
      directions, help draw HTML/Mermaid mockups and integrate Stitch designs."
    desc_ai_engineer_agent: "AI/LLM developer agent: optimize prompt templates,
      manage token budget, prevent prompt injection and allocate model tiers."
    desc_data_architect_agent: "Data administration agent: design DB schemas,
      synchronize migrations (Prisma) and verify consistency of Data Specs."
    desc_data_strategist_agent: "Data strategy agent: plan integrated data analysis,
      control backward compatibility and model project information structures."
  usecases_title: 💡 Usecase Action Guides
  usecases_desc: "Common operational scenarios and key workflows to resolve them in I-Wish:"
  usecase_1:
    title: GitHub Repository Absorption (RAP)
    desc: When you want to clone, parse, and absorb external repositories or skill
      templates from GitHub into I-Wish.
    action: "RAP pipeline: security-guardian scans for trust/malware,
      repo-absorption clones and indexes code graph, generates integration
      guide, and binds trigger tags for Orch routing."
  usecase_2:
    title: Clone Existing Website (Cloner)
    desc: When you need to copy visual layouts of a public website and output clean
      React/HTML UI components.
    action: "Browser-driven cloning: Captures DOM/CSS structures, extracts
      typography, layout tokens, and compiles code."
  usecase_3:
    title: UI Design Synchronization (Stitch / UX Pro Max)
    desc: When you design mockups and want to synchronize design specs with Stitch
      design server.
    action: "UX sync workflow: run /create-ux-design and /make-ui-spec. Call
      /sync-stitch-design to push changes. Visual-fidelity-gate automatically
      reviews if frontend code matches mockups."
  usecase_4:
    title: Codebase Analysis & Knowledge Graphing
    desc: To map file imports and trace story implementation impacts (Feature Graph)
      for Orch routing.
    action: "Analyzer: Scans source code, traces functional dependency nodes, and
      updates Dashboard graphs."
  usecase_5:
    title: Canary Trialling & Staging Validation
    desc: To trial new code on a subset of staging traffic prior to full production
      release.
    action: "Deployment workflow: run /canary to spin up sandboxes, monitor
      performance, and automate rollbacks."
  usecase_6:
    title: Urgent Hotfixing & Operational Diagnostics
    desc: Diagnose production bugs and safely implement hotfixes without breaking
      baseline compatibility.
    action: "Diagnostics loop: run /fix-bug for root-cause analysis, generate
      regression tests, and apply patches."
  usecase_7:
    title: Brand Identity, Logo & Style Guidelines
    desc: Create brand assets, logos, and guidelines from scratch or refactor
      existing ones.
    action: "Prism workflow: run /brand to questionnaire Brand Prism, draw concept
      logos, and export design tokens."
  label_note: "Note:"
  label_output: "Output:"
plugins:
  sidebar_title: Tournament Arena
  nav_intro: ℹ️ Overview
  nav_registry: 🔌 Plugins Registry
  nav_workflow: ⚔️ 5-Step Pipeline
  nav_usecases: 💡 Practical Use Cases
  nav_slash: 💬 Syntax & Examples
  title: 🔌 Plugin-driven A/B Tournaments
  intro: I-Wish utilizes a flexible plugin architecture alongside an advanced A/B
    Tournament system. Instead of directly merging every absorbed repository or
    skill set into the core codebase, users can package them as isolated
    plugins. When a task requires execution, you can trigger a parallel
    tournament where multiple candidate plugins work in isolated workspaces and
    complete the task independently. The system then evaluates the results and
    allows you to select the best outcome.
  card_isolation:
    title: 🛡️ Safe Isolation
    desc: Candidates execute tasks on separate Git branches in independent
      workspaces. No workspace collision or dirty states.
  card_evaluation:
    title: 📊 Fair Evaluation
    desc: The review-agent evaluates each candidate against requirements, code
      quality, stability, and automated tests.
  card_hitl:
    title: 👑 Human-in-the-Loop
    desc: Review the competitive scorecard and diffs in a clear visual layout, and
      select which candidate to merge.
  registry_title: 🔌 Plugins & Modules Registry (Plugins List)
  registry_desc: "Below is the registry of active plugins, categorized by
    functional domains, used to manage and configure tournaments:"
  registry_uiux: 🎨 UI/UX & Design Providers (Design & Interfaces)
  registry_coding: ⚡ Coding & Productivity (Coding & Performance)
  registry_badge_illustrative: ILLUSTRATIVE EXAMPLE
  desc_uiux_pro_max: Plugin for highly responsive interfaces, bespoke transitions,
    and refined visual tokens.
  desc_taste_skill: Layout provider specializing in aesthetic micro-details, HSL
    palettes, and luxury typography.
  desc_stitch: Default visual specification system integrated with the Stitch design server.
  desc_superpower: Algorithm-heavy optimization module providing advanced code
    generation and refactoring.
  desc_vibecode: Streamlined, prompt-driven developer framework prioritizing speed.
  desc_native: Core I-Wish developer implementation workflow (standard dev-agent execution).
  workflow_title: ⚔️ 5-Phase Tournament Pipeline
  workflow_desc: The A/B Tournament pipeline runs through 5 distinct phases to
    guarantee code quality and stability.
  step_setup:
    title: Arena Setup
    focus: "Goal: Ensure total isolation between candidates."
    desc: Verifies git cleanliness. For each selected candidate, I-Wish
      automatically forks a new Git branch branching off the baseline commit.
  step_dispatch:
    title: Agent Dispatch
    focus: "Goal: Execute tasks in parallel workspaces."
    desc: "Launches parallel subagents with Workspace: branch configuration. Each
      agent executes instructions inside its isolated branch context."
  step_gate:
    title: Resolution Gate
    focus: "Goal: Objective grading and evaluation."
    desc: Compiles code and runs automated tests (npm test). The review-agent scores
      each candidate across requirements, quality, safety, and test passes.
  step_human:
    title: Human Checkpoint
    focus: "Goal: User approves the best solution."
    desc: Displays the scorecard comparing candidates' diffs and logs. The user
      selects which branch to merge, or aborts the tournament entirely.
  step_merge:
    title: Merge & Cleanup
    focus: "Goal: Apply clean merges and remove temporary branches."
    desc: Merges the approved winning branch into the baseline. All temporary
      tournament branches and subagent workspaces are automatically deleted.
  usecases_title: 💡 Practical Use Cases
  usecases_desc: Real-world scenarios where launching an A/B Tournament helps
    resolve complex architectural choices.
  usecase_design:
    title: "🎨 Scenario 1: Comparing visual design layout styles"
    desc: You want to build a user interface (e.g., Login Page) and visually compare
      multiple design providers before merging.
    action: Run tournament with ui-ux-pro-max (animations), taste-skill (luxury
      fonts), and native (default).
    cmd_label: "Activation Command:"
    cmd_text: /tournament Design a luxury login page with modules ui-ux-pro-max,
      taste-skill, and native
    result: "👉 Result: Three branches run in parallel. A scorecard summarizes
      design styles and code quality for final human selection."
  usecase_optim:
    title: "⚡ Scenario 2: Algorithm optimization and performance benchmark"
    desc: You need to write a performance-critical data processor and want to
      evaluate resource efficiency.
    action: Compete Superpower (heavy math optimizations), vibecode-pro-max
      (lightweight code), and native.
    cmd_label: "Activation Command:"
    cmd_text: /tournament Optimize pathfinder algorithm for 10000 nodes using
      modules Superpower, vibecode-pro-max, and native
    result: "👉 Result: Competing candidates output benchmark metrics (memory,
      speed) on the scorecard for objective comparison."
  syntax_title: 💬 Natural Language Activation Syntax
  syntax_desc: "Instead of long CLI flags, you can invoke a tournament in
    conversational natural language. The request must contain 3 core parts:"
  syntax_part1: "1. Task Action & Description: Clearly state what you want to
    implement (e.g., 'Design a luxury login page')."
  syntax_part2: "2. Connecting Keyword: Linking phrase (e.g., 'with modules', 'using')."
  syntax_part3: "3. Candidates List: Comma-separated list of candidate modules
    joined by 'and'/'or' (e.g., 'ui-ux-pro-max, taste-skill, and native')."
  syntax_example_label: "Example request:"
  warning_title: "⚠️ Edge-case: What if you forget to specify candidate modules?"
  warning_desc: "If you run `/tournament [Task Description]` but omit the
    candidates list entirely (e.g., `/tournament Create login page`), the system
    triggers a degradation fallback:"
  warning_point1: "Defaults to running the task on a single candidate: native
    (baseline developer workflow)."
  warning_point2: Emits a console warning reminder showing how to add candidates next time.
  warning_point3: Ensures continuity of operations without throwing errors or locking up.
