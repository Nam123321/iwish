<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/B Testing: Idea Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .split {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
        }
        .pane:last-child {
            border-right: none;
        }
        .header {
            background-color: #f3f4f6;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title {
            font-weight: 600;
            color: #374151;
        }
        .header-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-weight: 500;
        }
        .badge-draft { background-color: #fef3c7; color: #92400e; }
        .badge-production { background-color: #d1fae5; color: #065f46; }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="split">
        <!-- Draft Version (Version A) -->
        <div class="pane">
            <div class="header">
                <span class="header-title">Version A: Draft</span>
                <span class="header-badge badge-draft">Regex Parser</span>
            </div>
            <iframe src="draft/idea-navigator.html" title="Draft Idea Navigator"></iframe>
        </div>
        
        <!-- Production Version (Version B) -->
        <div class="pane">
            <div class="header">
                <span class="header-title">Version B: Production</span>
                <span class="header-badge badge-production">YAML + Knowledge Graph</span>
            </div>
            <iframe src="production/idea-navigator.html" title="Production Idea Navigator"></iframe>
        </div>
    </div>
</body>
</html>
